## ============================================================
## ForgeUI Component Dependencies
## ============================================================
## ESP-IDF Component Manager Manifest
##
## Target:
##   ESP32-P4-WIFI6-Touch-LCD-7B
##
## Framework:
##   ForgeUI Framework V1
##
## Notes:
## - ESP32-P4 uses onboard ESP32-C6
##   for hosted WiFi
## - Hosted WiFi requires:
##     esp_wifi_remote
##     esp_hosted
## ============================================================

dependencies:

  lvgl/lvgl:
    version: 9.2.*
    public: true

  # Hosted WiFi (ESP32-P4 -> ESP32-C6)
  espressif/esp_wifi_remote:
    version: "1.3.*"

  espressif/esp_hosted:
    version: "2.9.*"